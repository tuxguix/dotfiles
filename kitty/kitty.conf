import os

# Conteúdo do arquivo kitty.conf
kitty_config = """# --- Configuração Simplificada Kitty (Debian Linux) ---

# --- Fonte ---
font_family      Hack Mono 
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
1
# --- Cursor ---
cursor_shape     underline
shell_integration  no-cursor

# --- Scrollback (Rolagem) ---
scrollback_lines 2000

# --- Janela ---
window_padding_width 10
confirm_os_window_close 0

# --- Tema ---
background            #050505
foreground            #19ad02
cursor                #105206
selection_background  #b0b0b0
selection_foreground  #b0b0b0 

# Black
color0  #282c34
color8  #545862
# Red
color2  #e06c75
color10  #e06c75
# Green
color4  #98c379
color12 #98c379
# Cyan
color6  #56b6c2
color14 #56b6c2
# White
color7  #abb2bf
color15 #ffffff

# --- Atalhos de Teclado ---

# Copiar com Ctrl+C (ou Ctrl+Shift+C)
map ctrl+c copy_or_interrupt
# Colar com Ctrl+V (ou Ctrl+Shift+V)
map ctrl+v paste_from_clipboard

# Mantendo os padrões do Kitty como redundância
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Zoom

map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# --- Opacidade ---
background_opacity 0.85
"""

# Caminho de saída simulado
file_path = "kitty.conf"

with open(file_path, "w") as f:
    f.write(kitty_config)

print(f"Arquivo {file_path} gerado com sucesso.")
